services:
  telegram-captcha:
    build: .
    restart: unless-stopped
    environment:
      TELEGRAM_API_ID: "123456"
      TELEGRAM_API_HASH: "your_api_hash"
      TG_SESSION: "paste_your_string_session_here"
      CAPTCHA_ENABLED: "true"
      CAPTCHA_DEBUG: "true"
      CAPTCHA_CHATS: ""
      CAPTCHA_BOTS: "easfake"
      CAPTCHA_KEYWORDS: "人机验证,请选择计算结果,完成验证,验证码"
      CAPTCHA_OCR: "false"
      DOWNLOAD_DIR: "/app/downloads"
    volumes:
      - ./downloads:/app/downloads
